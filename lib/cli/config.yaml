server:
  port: 8080
  mode: http              # 'http' for service, 'cli' for command-line

models:
  default: llama33

backends:
  # ─────────────────────────────────────────────────────────────────────
  # LOCAL MODELS (llama.cpp embedded server)
  #
  # Each entry is a named provider you reference with -m <name>.
  # Set "type: llamacpp" when you need more than one local model.
  # The key name alone is enough for a single backend (backward compat).
  # ─────────────────────────────────────────────────────────────────────

  gemma4:
    type: llamacpp
    url: "embedded"
    port: 8002
    model: "gemma4"
    model_path: "${HOME}/.cache/huggingface/hub/models/google/gguf/gemma4:31b-q4km.gguf"
    # mmproj_path:
    idle_timeout_seconds: 60

  llama33:
    type: llamacpp
    url: "embedded"
    port: 8003
    model: "llama3.3"
    model_path: "${HOME}/.cache/huggingface/hub/models/meta/gguf/llam3.3:70b-q4km.gguf"
    # mmproj_path:
    idle_timeout_seconds: 60

  gpt-oss:
    type: llamacpp
    url: "embedded"
    port: 8010
    model: "gemma4"
    model_path: "${HOME}/.cache/huggingface/hub/models/openai/gguf/gpt-oss:20b-f16.gguf"
    # mmproj_path:
    idle_timeout_seconds: 60

  # Multiple local models — use explicit "type: llamacpp" + unique key names
  # Each gets its own llama-server on a separate port (auto-assigned or explicit).

  # Point to an already-running llama-server (no embedded spawn):
  # external-llm:
  #   type: llamacpp
  #   url: "http://192.168.1.50:8000"
  #   model: "my-remote-model"

  # ─────────────────────────────────────────────────────────────────────
  # OLLAMA (local daemon — run `ollama serve` first)
  # ─────────────────────────────────────────────────────────────────────

  # ollama:
  #   type: ollama
  #   model: "llama3.2"           # any model you've pulled with `ollama pull`
  #   url: "http://localhost:11434"  # optional — this is the default

  # ─────────────────────────────────────────────────────────────────────
  # CLOUD APIs
  # ─────────────────────────────────────────────────────────────────────

  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   model: "gpt-4o"

  # anthropic:
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   model: "claude-3-5-sonnet-20241022"

  # OpenAI-compatible endpoint (Azure, custom proxy, etc.):
  # openai-azure:
  #   type: openai
  #   api_key: "${AZURE_OPENAI_KEY}"
  #   url: "https://my-resource.openai.azure.com/..."
  #   model: "gpt-4"

  # ─────────────────────────────────────────────────────────────────────
  # TESTING
  # ─────────────────────────────────────────────────────────────────────

  mock:
    model: "test-model"

mcp_servers:
  - name: devtools
    enabled: true
    command: python3
    args: ["/Users/taylor/Data/Development/Projects/Guido/lib/cli/test-mcp-server.py"]

  # ── Remote server (HTTP+SSE or Streamable HTTP — auto-detected) ─────────────
  # Generic remote example with auth header:
  # - name: my-remote
  #   enabled: true
  #   url: "https://mcp.example.com"
  #   headers:
  #     Authorization: "Bearer ${MY_API_TOKEN}"