server:
  port: 8080
  # mode: http   # 'http' for service, 'cli' for command-line (default: http)

models:
  default: my-model   # backend key used when no -m flag is given

backends:

  # ── Local model (embedded llama-server) ─────────────────────────────────────
  # Guido starts and manages the llama-server subprocess automatically.
  # The server loads on the first request and optionally unloads after idle.
  my-model:
    type: llamacpp
    url: "embedded"
    port: 8002                                # port for this model's llama-server
    model: "my-model-name"                    # model name reported to clients
    model_path: "${HOME}/.cache/huggingface/hub/.../model.gguf"
    # mmproj_path: "${HOME}/.cache/huggingface/hub/.../mmproj.gguf"  # vision models only
    idle_timeout_seconds: 300                 # 0 = stay loaded until server stops
    # gpu_layers: 99                          # layers to offload to GPU (default: 99)

  # ── External llama-server (you manage it) ───────────────────────────────────
  # external:
  #   type: llamacpp
  #   url: "http://192.168.1.50:8000"
  #   model: "my-remote-model"

  # ── Ollama (local daemon — run `ollama serve` first) ────────────────────────
  # If model_path is set, Guido registers the GGUF with Ollama on first use.
  # ollama:
  #   type: ollama
  #   model: "llama3.2"                       # any model pulled with `ollama pull`
  #   url: "http://localhost:11434"           # optional — this is the default
  #   model_path: "${HOME}/.cache/huggingface/hub/.../model.gguf"  # optional

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   model: "gpt-4o"

  # ── Anthropic ───────────────────────────────────────────────────────────────
  # anthropic:
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   model: "claude-opus-4-5"

  # ── OpenAI-compatible endpoint (Azure, custom proxy, etc.) ──────────────────
  # openai-azure:
  #   type: openai
  #   api_key: "${AZURE_OPENAI_KEY}"
  #   url: "https://my-resource.openai.azure.com/..."
  #   model: "gpt-4"

  # ── Mock (testing — no model file needed) ───────────────────────────────────
  # mock:
  #   model: "test-model"

# ── MCP servers (optional) ──────────────────────────────────────────────────
# Connect to Model Context Protocol servers. Tools are available automatically
# when --mcp or no tool flag is used. Named mcp__<server>__<tool>.
#
# To enable, replace the empty list below with one or more server entries.
# Stdio (local subprocess) and remote HTTP servers are both supported.
#
# mcp_servers:
#   # Built-in test server (get_time, calculate, read_file, echo):
#   - name: devtools
#     enabled: true
#     command: python3
#     args: ["/path/to/guido/lib/cli/test-mcp-server.py"]
#
#   # Local filesystem access:
#   - name: filesystem
#     enabled: true
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "${HOME}/Documents"]
#
#   # Git repository tools:
#   - name: git
#     enabled: true
#     command: uvx
#     args: ["mcp-server-git", "--repository", "."]
#
#   # Remote server (HTTP+SSE or Streamable HTTP — auto-detected):
#   - name: my-remote
#     enabled: true
#     url: "https://mcp.example.com"
#     headers:
#       Authorization: "Bearer ${MY_API_TOKEN}"
mcp_servers: []
