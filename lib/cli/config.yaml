server:
  port: 8080
  mode: http              # 'http' for service, 'cli' for command-line

models:
  default: gemma4-q4km       # Default provider name to use if not specified in request

backends:
  # ─────────────────────────────────────────────────────────────────────
  # LOCAL MODELS (llama.cpp embedded server)
  #
  # Each entry is a named provider you reference with -m <name>.
  # Set "type: llamacpp" when you need more than one local model.
  # The key name alone is enough for a single backend (backward compat).
  # ─────────────────────────────────────────────────────────────────────

  # Single local model — classic style, key name = type
  gemma4-q4km:
    type: llamacpp
    url: "embedded"
    port: 8002
    model: "gemma4:31b-q4km"
    model_path: "${HOME}/.cache/huggingface/hub/models--google--gemma-4-31B/gguf/model-q4km.gguf"
    mmproj_path: "${HOME}/.cache/huggingface/hub/models--google--gemma-4-31B/gguf/model-f16-mmproj.gguf"
    idle_timeout_seconds: 60  # Unload from VRAM after N seconds idle (0 = keep loaded forever)

  # Multiple local models — use explicit "type: llamacpp" + unique key names
  # Each gets its own llama-server on a separate port (auto-assigned or explicit).

  # Point to an already-running llama-server (no embedded spawn):
  # external-llm:
  #   type: llamacpp
  #   url: "http://192.168.1.50:8000"
  #   model: "my-remote-model"

  # ─────────────────────────────────────────────────────────────────────
  # CLOUD APIs
  # ─────────────────────────────────────────────────────────────────────

  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   model: "gpt-4"

  # anthropic:
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   model: "claude-3-sonnet-20240229"

  # Multiple OpenAI-style providers (e.g. Azure endpoint alongside OpenAI):
  # openai-azure:
  #   type: openai
  #   api_key: "${AZURE_OPENAI_KEY}"
  #   url: "https://my-resource.openai.azure.com/..."
  #   model: "gpt-4"

  # ─────────────────────────────────────────────────────────────────────
  # TESTING
  # ─────────────────────────────────────────────────────────────────────

  mock:
    model: "test-model"
